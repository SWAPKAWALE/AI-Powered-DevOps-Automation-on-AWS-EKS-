apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: boutique-minikube
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/SWAPKAWALE/AI-Powered-DevOps-Automation-on-AWS-EKS-
    targetRevision: main
    path: gitops/minikube

  destination:
    server: https://kubernetes.default.svc
    namespace: boutique

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
