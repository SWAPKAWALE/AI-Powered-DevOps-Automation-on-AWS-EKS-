name: Local No-AWS CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  local-build:
    name: Validate local microservices build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify Docker Compose config
        working-directory: projects/boutique-microservices
        run: docker compose -f docker-compose.yml config

      - name: Build backend Docker images
        working-directory: projects/boutique-microservices
        run: |
          for SERVICE in auth gateway orders order-service product-service user-service; do
            echo "Building $SERVICE"
            docker build -t boutique-$SERVICE:${{ github.sha }} ./backend/services/$SERVICE
          done

      - name: Build React frontend
        working-directory: projects/boutique-microservices/frontend
        run: |
          npm install --legacy-peer-deps --workspaces=false
          npm install ajv@8 ajv-keywords@5 --legacy-peer-deps --workspaces=false
          CI=false npm run build --workspaces=false
